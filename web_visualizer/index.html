<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini_SONiC Network Visualizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header h1 {
            font-size: 24px;
            color: #4fc3f7;
        }

        .controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #1976d2;
            color: white;
        }

        .btn-primary:hover {
            background: #1565c0;
        }

        .btn-danger {
            background: #d32f2f;
            color: white;
        }

        .btn-danger:hover {
            background: #c62828;
        }

        .btn-small {
            padding: 4px 12px;
            font-size: 16px;
            font-weight: bold;
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: 20px;
            padding: 4px 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        .speed-control span {
            color: #ccc;
            font-size: 13px;
        }

        #speedValue {
            color: #4fc3f7;
            font-weight: bold;
            min-width: 30px;
            text-align: center;
        }

        .status {
            padding: 8px 15px;
            border-radius: 5px;
            font-size: 14px;
        }

        .status.connected {
            background: #66bb6a;
            color: white;
        }

        .status.disconnected {
            background: #ef5350;
            color: white;
        }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .visualization-panel {
            flex: 2;
            position: relative;
            background: rgba(0, 0, 0, 0.2);
        }

        #networkCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .event-panel {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            max-width: 400px;
        }

        .event-header {
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .event-header h2 {
            font-size: 18px;
            color: #4fc3f7;
        }

        .event-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .event-item {
            padding: 10px;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 5px;
            border-left: 3px solid #4fc3f7;
            font-size: 13px;
        }

        .event-item.packet {
            border-left-color: #66bb6a;
        }

        .event-item.switch {
            border-left-color: #4fc3f7;
        }

        .event-item.error {
            border-left-color: #ef5350;
        }

        .event-time {
            color: #888;
            font-size: 11px;
            margin-bottom: 3px;
        }

        .event-type {
            font-weight: bold;
            color: #4fc3f7;
        }

        .event-details {
            color: #b0b0b0;
            margin-top: 3px;
        }

        /* Packet card styling */
        .packet-card {
            position: absolute;
            background: rgba(76, 175, 80, 0.9);
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 11px;
            pointer-events: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            z-index: 100;
        }

        .packet-card .packet-id {
            font-weight: bold;
            margin-bottom: 3px;
        }

        .packet-card .packet-info {
            font-size: 10px;
            opacity: 0.9;
        }

        /* Switch node styling (rendered on canvas) */
        .switch-node {
            fill: #1976d2;
            stroke: #4fc3f7;
            stroke-width: 2;
        }

        .switch-node.active {
            fill: #66bb6a;
            stroke: #81c784;
        }

        .switch-label {
            fill: white;
            font-size: 12px;
            font-weight: bold;
        }

        .link-line {
            stroke: #555;
            stroke-width: 2;
        }

        .link-line.active {
            stroke: #66bb6a;
            stroke-width: 3;
        }

        /* Statistics panel */
        .stats-panel {
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .stat-label {
            color: #888;
        }

        .stat-value {
            color: #4fc3f7;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Mini_SONiC Network Visualizer</h1>
        <div class="controls">
            <button id="connectBtn" class="btn btn-primary">Connect</button>
            <button id="disconnectBtn" class="btn btn-danger">Disconnect</button>
            <span id="connectionStatus" class="status disconnected">Disconnected</span>
            <div class="speed-control">
                <span>Speed:</span>
                <button id="speedDownBtn" class="btn btn-small">-</button>
                <span id="speedValue">1x</span>
                <button id="speedUpBtn" class="btn btn-small">+</button>
            </div>
        </div>
    </div>

    <div class="main-container">
        <div class="visualization-panel">
            <canvas id="networkCanvas"></canvas>
            <div class="panel">
                <div class="panel-header">
                    <h2>Event Log</h2>
                    <div class="stats">
                        <span id="eventCount">0</span> events
                    </div>
                </div>
                <div class="event-list" id="eventList">
                    <div class="event-item">
                        <div class="event-time">--:--:--</div>
                        <div class="event-type">System</div>
                        <div class="event-details">Visualizer initialized. Click Connect to start.</div>
                    </div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <h2>Packet Traversal History</h2>
                    <div class="stats">
                        <span id="packetHistoryCount">0</span> packets
                    </div>
                </div>
                <div class="event-list" id="packetHistoryList"></div>
            </div>
        </div>

        <div class="event-panel">
            <div class="stats-panel">
                <div class="stat-item">
                    <span class="stat-label">Events Received:</span>
                    <span id="eventCount" class="stat-value">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Packets Processed:</span>
                    <span id="packetCount" class="stat-value">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Active Switches:</span>
                    <span id="switchCount" class="stat-value">0</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        class NetworkVisualizer {
            constructor() {
                this.canvas = document.getElementById('networkCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.eventList = document.getElementById('eventList');
                this.connectBtn = document.getElementById('connectBtn');
                this.disconnectBtn = document.getElementById('disconnectBtn');
                this.connectionStatus = document.getElementById('connectionStatus');
                this.speedUpBtn = document.getElementById('speedUpBtn');
                this.speedDownBtn = document.getElementById('speedDownBtn');
                this.speedValue = document.getElementById('speedValue');
                
                this.ws = null;
                this.connected = false;
                this.eventCount = 0;
                this.packetCount = 0;
                this.speed = 1; // Speed multiplier (1x, 2x, 3x, etc.)

                this.switches = new Map();
                this.links = [];
                this.packets = new Map();
                this.activePackets = [];
                this.packetHistory = new Map(); // Track packet traversal history
                
                this.initTopology();
                this.resizeCanvas();
                this.setupEventListeners();
                this.startAnimation();
            }

            initTopology() {
                // Define initial switches with detailed information - spread out layout
                this.switches.set('TOR1', {
                    name: 'TOR1',
                    role: 'Top-of-Rack',
                    x: 50,
                    y: 50,
                    width: 200,
                    height: 180,
                    active: false,
                    ports: [
                        { name: 'Eth0', speed: '100G', state: 'UP', type: '', queue: 40 },
                        { name: 'Eth4', speed: '100G', state: 'UP', type: 'LAG1', queue: 60 },
                        { name: 'Eth8', speed: '100G', state: 'DOWN', type: '', queue: 0 }
                    ],
                    routing: 'ECMP: hash=0xA3 → Eth4',
                    acl: 'permit tcp dst 443',
                    qos: 'DSCP 46 → Q3',
                    stats: { packets: 12400, drops: 42, cpu: 3 }
                });
                this.switches.set('Spine1', {
                    name: 'Spine1',
                    role: 'Spine',
                    x: 450,
                    y: 20,
                    width: 200,
                    height: 180,
                    active: false,
                    ports: [
                        { name: 'Eth0', speed: '400G', state: 'UP', type: '', queue: 30 },
                        { name: 'Eth4', speed: '400G', state: 'UP', type: '', queue: 45 },
                        { name: 'Eth8', speed: '400G', state: 'UP', type: '', queue: 35 }
                    ],
                    routing: 'Route: 10.0.3.0/24 via TOR2',
                    acl: '',
                    qos: '',
                    stats: { packets: 45000, drops: 12, cpu: 5 }
                });
                this.switches.set('Spine2', {
                    name: 'Spine2',
                    role: 'Spine',
                    x: 450,
                    y: 280,
                    width: 200,
                    height: 180,
                    active: false,
                    ports: [
                        { name: 'Eth0', speed: '400G', state: 'UP', type: '', queue: 25 },
                        { name: 'Eth4', speed: '400G', state: 'UP', type: '', queue: 40 },
                        { name: 'Eth8', speed: '400G', state: 'UP', type: '', queue: 30 }
                    ],
                    routing: 'Route: 10.0.1.0/24 via TOR1',
                    acl: '',
                    qos: '',
                    stats: { packets: 42000, drops: 8, cpu: 4 }
                });
                this.switches.set('TOR2', {
                    name: 'TOR2',
                    role: 'Top-of-Rack',
                    x: 850,
                    y: 50,
                    width: 200,
                    height: 180,
                    active: false,
                    ports: [
                        { name: 'Eth0', speed: '100G', state: 'UP', type: '', queue: 35 },
                        { name: 'Eth4', speed: '100G', state: 'UP', type: 'LAG2', queue: 50 },
                        { name: 'Eth8', speed: '100G', state: 'DOWN', type: '', queue: 0 }
                    ],
                    routing: 'ECMP: hash=0xB7 → Eth4',
                    acl: 'permit tcp dst 443',
                    qos: 'DSCP 46 → Q3',
                    stats: { packets: 11800, drops: 35, cpu: 3 }
                });
                this.switches.set('Leaf1', {
                    name: 'Leaf1',
                    role: 'Leaf',
                    x: 850,
                    y: 280,
                    width: 200,
                    height: 180,
                    active: false,
                    ports: [
                        { name: 'Eth0', speed: '100G', state: 'UP', type: '', queue: 28 },
                        { name: 'Eth4', speed: '100G', state: 'UP', type: '', queue: 32 },
                        { name: 'Eth8', speed: '100G', state: 'UP', type: '', queue: 38 }
                    ],
                    routing: 'Route: 10.0.5.0/24 via Spine1',
                    acl: '',
                    qos: '',
                    stats: { packets: 9500, drops: 15, cpu: 2 }
                });

                // Define links between switches with more complex topology
                this.links = [
                    { from: 'TOR1', to: 'Spine1', active: false },
                    { from: 'TOR1', to: 'Spine2', active: false },
                    { from: 'TOR2', to: 'Spine1', active: false },
                    { from: 'TOR2', to: 'Spine2', active: false },
                    { from: 'Spine1', to: 'Spine2', active: false }, // Spine-to-Spine link
                    { from: 'Leaf1', to: 'Spine1', active: false },
                    { from: 'Leaf1', to: 'Spine2', active: false }
                ];
            }

            resizeCanvas() {
                const container = this.canvas.parentElement;
                this.canvas.width = container.clientWidth;
                this.canvas.height = container.clientHeight;
                this.draw();
            }

            setupEventListeners() {
                this.connectBtn.addEventListener('click', () => this.connect());
                this.disconnectBtn.addEventListener('click', () => this.disconnect());
                this.speedUpBtn.addEventListener('click', () => this.changeSpeed(1));
                this.speedDownBtn.addEventListener('click', () => this.changeSpeed(-1));
                window.addEventListener('resize', () => this.resizeCanvas());
            }

            connect() {
                if (this.connected) return;

                this.ws = new WebSocket('ws://127.0.0.1:8080');
                this.ws.binaryType = 'arraybuffer';

                this.ws.onopen = () => {
                    this.connected = true;
                    this.connectionStatus.textContent = 'Connected';
                    this.connectionStatus.style.color = '#4caf50';
                    this.connectBtn.disabled = true;
                    this.disconnectBtn.disabled = false;
                    this.logEvent('Connection', 'WebSocket connected', 'system');

                    // Request topology from server
                    this.queryTopology();
                };

                this.ws.onmessage = (event) => {
                    try {
                        const data = event.data.trim();
                        if (!data) return;

                        // Handle multiple JSON objects in one message
                        const lines = data.split('\n');
                        lines.forEach(line => {
                            if (!line.trim()) return;
                            const json = JSON.parse(line);
                            this.handleEvent(json);
                        });
                    } catch (e) {
                        console.error('Failed to parse message:', e);
                    }
                };

                this.ws.onerror = (error) => {
                    console.error('WebSocket error:', error);
                    this.logEvent('Error', 'WebSocket connection error', 'system');
                };

                this.ws.onclose = () => {
                    this.connected = false;
                    this.connectionStatus.textContent = 'Disconnected';
                    this.connectionStatus.style.color = '#f44336';
                    this.connectBtn.disabled = false;
                    this.disconnectBtn.disabled = true;
                    this.logEvent('Connection', 'WebSocket disconnected', 'system');
                };
            }

            queryTopology() {
                if (this.connected && this.ws) {
                    const message = {
                        type: 'topology_query'
                    };
                    this.ws.send(JSON.stringify(message));
                }
            }

            disconnect() {
                if (this.ws) {
                    this.ws.close();
                    this.ws = null;
                }
            }

            changeSpeed(delta) {
                const newSpeed = this.speed + delta;
                if (newSpeed >= 1 && newSpeed <= 10) {
                    this.speed = newSpeed;
                    this.speedValue.textContent = this.speed + 'x';
                    this.sendSpeedControl();
                }
            }

            sendSpeedControl() {
                if (this.connected && this.ws) {
                    const message = {
                        type: 'speed_control',
                        speed: this.speed
                    };
                    this.ws.send(JSON.stringify(message));
                }
            }

            handleEvent(event) {
                this.eventCount++;
                document.getElementById('eventCount').textContent = this.eventCount;

                switch (event.type) {
                    case 'topology':
                        this.handleTopology(event);
                        break;
                    case 'PacketGenerated':
                        this.handlePacketGenerated(event);
                        break;
                    case 'PacketEnteredSwitch':
                        this.handlePacketEnteredSwitch(event);
                        break;
                    case 'PacketForwardDecision':
                        this.handlePacketForwardDecision(event);
                        break;
                    case 'PacketExitedSwitch':
                        this.handlePacketExitedSwitch(event);
                        break;
                    case 'PortStateChanged':
                        this.handlePortStateChanged(event);
                        break;
                    default:
                        this.logEvent(event.type, JSON.stringify(event));
                }
            }

            handleTopology(event) {
                // Update switches from topology
                this.switches.clear();
                event.switches.forEach(sw => {
                    this.switches.set(sw.id, {
                        name: sw.name,
                        role: sw.role,
                        x: sw.x,
                        y: sw.y,
                        width: 200,
                        height: 180,
                        active: false,
                        ports: [
                            { name: 'Eth0', speed: '100G', state: 'UP', type: '', queue: 40 },
                            { name: 'Eth4', speed: '100G', state: 'UP', type: 'LAG1', queue: 60 },
                            { name: 'Eth8', speed: '100G', state: 'DOWN', type: '', queue: 0 }
                        ],
                        routing: 'ECMP: hash=0xA3 → Eth4',
                        acl: 'permit tcp dst 443',
                        qos: 'DSCP 46 → Q3',
                        stats: { packets: 12400, drops: 42, cpu: 3 }
                    });
                });

                // Update links from topology
                this.links = event.links.map(link => ({
                    from: link.from,
                    to: link.to,
                    active: false
                }));

                this.logEvent('Topology', `Updated topology: ${event.switches.length} switches, ${event.links.length} links`, 'system');
                this.draw();
            }

            handlePacketGenerated(event) {
                const packet = event.packet;
                this.logEvent('PacketGenerated', `Packet ${packet.id}: ${packet.src_ip} -> ${packet.dst_ip}`, 'packet');
                this.packetCount++;
                document.getElementById('packetCount').textContent = this.packetCount;
            }

            handlePacketEnteredSwitch(event) {
                const switchId = event.switch_id;
                const packetId = event.packet_id;
                const ingressPort = event.ingressPort;

                this.logEvent('PacketEnteredSwitch', `Packet ${packetId} entered ${switchId} on ${ingressPort}`, 'switch');

                // Track packet traversal history
                if (!this.packetHistory.has(packetId)) {
                    this.packetHistory.set(packetId, {
                        id: packetId,
                        path: [],
                        startTime: new Date()
                    });
                }
                const history = this.packetHistory.get(packetId);
                history.path.push({
                    switch: switchId,
                    action: 'entered',
                    port: ingressPort,
                    timestamp: new Date()
                });
                this.updatePacketHistoryDisplay();

                // Highlight switch
                if (this.switches.has(switchId)) {
                    const sw = this.switches.get(switchId);
                    sw.active = true;
                    setTimeout(() => sw.active = false, 500);
                }

                // Don't create internal animation - only animate when packet exits switch
            }

            handlePacketForwardDecision(event) {
                const switchId = event.switch_id;
                const egressPort = event.egress_port;
                const nextHop = event.next_hop;
                
                this.logEvent('PacketForwardDecision', `${switchId} -> ${nextHop} via ${egressPort}`, 'switch');
                
                // Activate link
                this.links.forEach(link => {
                    if (link.from === switchId || link.to === switchId) {
                        link.active = true;
                        setTimeout(() => link.active = false, 300);
                    }
                });
            }

            handlePacketExitedSwitch(event) {
                const switchId = event.switch_id;
                const packetId = event.packet_id;
                const egressPort = event.egressPort;
                const nextHop = event.next_hop;

                this.logEvent('PacketExitedSwitch', `Packet ${packetId} exited ${switchId} via ${egressPort} to ${nextHop}`, 'switch');

                // Track packet traversal history
                if (this.packetHistory.has(packetId)) {
                    const history = this.packetHistory.get(packetId);
                    history.path.push({
                        switch: switchId,
                        action: 'exited',
                        port: egressPort,
                        nextHop: nextHop,
                        timestamp: new Date()
                    });
                    this.updatePacketHistoryDisplay();
                }

                // Animate packet moving along link to next switch
                if (this.switches.has(switchId) && this.switches.has(nextHop)) {
                    const fromSwitch = this.switches.get(switchId);
                    const toSwitch = this.switches.get(nextHop);
                    const packetDetails = {
                        src_ip: event.src_ip || '10.0.1.2',
                        dst_ip: event.dst_ip || '10.0.3.7',
                        src_port: event.src_port || '443',
                        dst_port: event.dst_port || '51832',
                        dscp: event.dscp || '46',
                        ttl: event.ttl || '62',
                        state: event.state || 'normal'
                    };
                    this.createLinkAnimation(packetId, fromSwitch, toSwitch, packetDetails);
                }
            }

            handlePortStateChanged(event) {
                const switchId = event.switch_id;
                const port = event.port;
                const state = event.state;

                this.logEvent('PortStateChanged', `Port ${port} on ${switchId} changed to ${state}`, 'switch');
            }

            createLinkAnimation(packetId, fromSwitch, toSwitch, packetDetails) {
                // Calculate center points of switches
                const fromX = fromSwitch.x + fromSwitch.width / 2;
                const fromY = fromSwitch.y + fromSwitch.height / 2;
                const toX = toSwitch.x + toSwitch.width / 2;
                const toY = toSwitch.y + toSwitch.height / 2;

                this.activePackets.push({
                    id: packetId,
                    x: fromX,
                    y: fromY,
                    targetX: toX,
                    targetY: toY,
                    progress: 0,
                    speed: 0.005, // Slower animation
                    src_ip: packetDetails.src_ip || '10.0.1.2',
                    dst_ip: packetDetails.dst_ip || '10.0.3.7',
                    src_port: packetDetails.src_port || '443',
                    dst_port: packetDetails.dst_port || '51832',
                    dscp: packetDetails.dscp || '46',
                    ttl: packetDetails.ttl || '62',
                    state: packetDetails.state || 'normal'
                });
            }

            logEvent(type, details, category = 'switch') {
                const time = new Date().toLocaleTimeString();
                const eventItem = document.createElement('div');
                eventItem.className = `event-item ${category}`;
                eventItem.innerHTML = `
                    <div class="event-time">${time}</div>
                    <div class="event-type">${type}</div>
                    <div class="event-details">${details}</div>
                `;
                this.eventList.insertBefore(eventItem, this.eventList.firstChild);

                // Keep only last 100 events
                while (this.eventList.children.length > 100) {
                    this.eventList.removeChild(this.eventList.lastChild);
                }
            }

            updatePacketHistoryDisplay() {
                const historyList = document.getElementById('packetHistoryList');
                historyList.innerHTML = '';

                // Show last 20 packets
                const recentPackets = Array.from(this.packetHistory.entries()).slice(-20).reverse();

                recentPackets.forEach(([packetId, history]) => {
                    const pathStr = history.path.map(p => `${p.switch} (${p.action})`).join(' → ');
                    const item = document.createElement('div');
                    item.className = 'event-item packet';
                    item.innerHTML = `
                        <div class="event-time">${history.startTime.toLocaleTimeString()}</div>
                        <div class="event-type">Packet ${packetId}</div>
                        <div class="event-details">${pathStr}</div>
                    `;
                    historyList.appendChild(item);
                });

                document.getElementById('packetHistoryCount').textContent = this.packetHistory.size;
            }

            startAnimation() {
                const animate = () => {
                    this.updatePackets();
                    this.draw();
                    requestAnimationFrame(animate);
                };
                animate();
            }

            updatePackets() {
                this.activePackets = this.activePackets.filter(packet => {
                    packet.progress += packet.speed;

                    // Handle fade out for dropped packets
                    if (packet.state === 'drop') {
                        if (!packet.opacity) packet.opacity = 1.0;
                        packet.opacity -= 0.05;
                        if (packet.opacity <= 0) {
                            return false;
                        }
                    }

                    if (packet.progress >= 1) {
                        return false;
                    }
                    packet.x += (packet.targetX - packet.x) * packet.speed;
                    packet.y += (packet.targetY - packet.y) * packet.speed;
                    return true;
                });
            }

            draw() {
                const ctx = this.ctx;
                ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                // Draw links
                this.links.forEach(link => {
                    const from = this.switches.get(link.from);
                    const to = this.switches.get(link.to);
                    if (from && to) {
                        ctx.beginPath();
                        ctx.moveTo(from.x + from.width / 2, from.y + from.height / 2);
                        ctx.lineTo(to.x + to.width / 2, to.y + to.height / 2);
                        ctx.strokeStyle = link.active ? '#66bb6a' : '#555';
                        ctx.lineWidth = link.active ? 3 : 2;
                        ctx.stroke();
                    }
                });
                
                // Draw switches with detailed information
                this.switches.forEach(sw => {
                    // Draw switch box
                    ctx.fillStyle = sw.active ? '#66bb6a' : '#1976d2';
                    ctx.strokeStyle = sw.active ? '#81c784' : '#4fc3f7';
                    ctx.lineWidth = 2;
                    ctx.fillRect(sw.x, sw.y, sw.width, sw.height);
                    ctx.strokeRect(sw.x, sw.y, sw.width, sw.height);

                    // Draw switch name and role
                    ctx.fillStyle = 'white';
                    ctx.font = 'bold 12px Segoe UI';
                    ctx.fillText(`${sw.name} (${sw.role})`, sw.x + 10, sw.y + 18);

                    // Draw ports section
                    ctx.fillStyle = '#e3f2fd';
                    ctx.font = 'bold 10px Segoe UI';
                    ctx.fillText('Ports:', sw.x + 10, sw.y + 35);

                    sw.ports.forEach((port, i) => {
                        const portY = sw.y + 50 + i * 18;
                        const stateColor = port.state === 'UP' ? '#4caf50' :
                                         port.state === 'DOWN' ? '#f44336' : '#ff9800';

                        // Port name and speed
                        ctx.fillStyle = 'white';
                        ctx.font = '9px Segoe UI';
                        ctx.fillText(`${port.name} ${port.speed} ${port.type}`, sw.x + 10, portY);

                        // Port state indicator
                        ctx.fillStyle = stateColor;
                        ctx.beginPath();
                        ctx.arc(sw.x + 130, portY - 3, 4, 0, Math.PI * 2);
                        ctx.fill();

                        // Queue utilization bar
                        const queueWidth = 50;
                        const queueHeight = 6;
                        const queueX = sw.x + 140;
                        const queueY = portY - 8;

                        // Background
                        ctx.fillStyle = '#333';
                        ctx.fillRect(queueX, queueY, queueWidth, queueHeight);

                        // Fill based on queue percentage
                        ctx.fillStyle = port.queue > 70 ? '#f44336' : port.queue > 40 ? '#ff9800' : '#4caf50';
                        ctx.fillRect(queueX, queueY, queueWidth * (port.queue / 100), queueHeight);
                    });

                    // Draw routing section
                    if (sw.routing) {
                        ctx.fillStyle = '#e3f2fd';
                        ctx.font = 'bold 10px Segoe UI';
                        ctx.fillText('Routing:', sw.x + 10, sw.y + 105);
                        ctx.fillStyle = 'white';
                        ctx.font = '9px Segoe UI';
                        ctx.fillText(sw.routing, sw.x + 10, sw.y + 118);
                    }

                    // Draw ACL section
                    if (sw.acl) {
                        ctx.fillStyle = '#e3f2fd';
                        ctx.font = 'bold 10px Segoe UI';
                        ctx.fillText('ACL:', sw.x + 10, sw.y + 133);
                        ctx.fillStyle = 'white';
                        ctx.font = '9px Segoe UI';
                        ctx.fillText(sw.acl, sw.x + 10, sw.y + 146);
                    }

                    // Draw QoS section
                    if (sw.qos) {
                        ctx.fillStyle = '#e3f2fd';
                        ctx.font = 'bold 10px Segoe UI';
                        ctx.fillText('QoS:', sw.x + 10, sw.y + 161);
                        ctx.fillStyle = 'white';
                        ctx.font = '9px Segoe UI';
                        ctx.fillText(sw.qos, sw.x + 10, sw.y + 174);
                    }

                    // Draw stats section
                    ctx.fillStyle = '#e3f2fd';
                    ctx.font = 'bold 10px Segoe UI';
                    ctx.fillText(`Stats: ${sw.stats.packets}pps, drops ${sw.stats.drops}, CPU ${sw.stats.cpu}%`, sw.x + 10, sw.y + 190);
                });
                
                // Draw animated packets as cards
                this.activePackets.forEach(packet => {
                    const cardWidth = 120;
                    const cardHeight = 60;
                    const x = packet.x - cardWidth / 2;
                    const y = packet.y - cardHeight / 2;
                    const radius = 8;

                    // Calculate tilt angle based on movement direction
                    const dx = packet.targetX - packet.x;
                    const dy = packet.targetY - packet.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    let tiltAngle = 0;
                    if (distance > 0) {
                        tiltAngle = Math.atan2(dy, dx) * 0.1; // Slight tilt based on direction
                    }

                    // Apply vibration if queued
                    let vibrationX = 0;
                    let vibrationY = 0;
                    if (packet.state === 'queued') {
                        vibrationX = (Math.random() - 0.5) * 4;
                        vibrationY = (Math.random() - 0.5) * 4;
                    }

                    // Save context and apply transformations
                    ctx.save();
                    ctx.translate(x + cardWidth / 2 + vibrationX, y + cardHeight / 2 + vibrationY);
                    ctx.rotate(tiltAngle);
                    ctx.translate(-cardWidth / 2, -cardHeight / 2);

                    // Apply opacity for fade out
                    if (packet.opacity !== undefined) {
                        ctx.globalAlpha = packet.opacity;
                    }

                    // Draw rounded rectangle background
                    ctx.fillStyle = packet.state === 'drop' ? '#f44336' :
                                   packet.state === 'queued' ? '#ff9800' :
                                   packet.state === 'remarked' ? '#9c27b0' :
                                   packet.state === 'ecmp' ? '#2196f3' : '#4caf50';
                    ctx.beginPath();
                    ctx.moveTo(radius, 0);
                    ctx.lineTo(cardWidth - radius, 0);
                    ctx.quadraticCurveTo(cardWidth, 0, cardWidth, radius);
                    ctx.lineTo(cardWidth, cardHeight - radius);
                    ctx.quadraticCurveTo(cardWidth, cardHeight, cardWidth - radius, cardHeight);
                    ctx.lineTo(radius, cardHeight);
                    ctx.quadraticCurveTo(0, cardHeight, 0, cardHeight - radius);
                    ctx.lineTo(0, radius);
                    ctx.quadraticCurveTo(0, 0, radius, 0);
                    ctx.fill();

                    // Draw packet details
                    ctx.fillStyle = 'white';
                    ctx.font = 'bold 11px Segoe UI';
                    ctx.fillText(`ID: ${packet.id}`, 8, 16);
                    ctx.font = '10px Segoe UI';
                    ctx.fillText(`${packet.src_ip} → ${packet.dst_ip}`, 8, 30);
                    ctx.fillText(`${packet.src_port} → ${packet.dst_port}`, 8, 44);
                    ctx.fillText(`DSCP: ${packet.dscp}  TTL: ${packet.ttl}`, 8, 56);

                    // Draw status icon if needed
                    if (packet.state === 'queued') {
                        ctx.fillStyle = 'white';
                        ctx.font = '14px Segoe UI';
                        ctx.fillText('⏳', cardWidth - 20, 18);
                    } else if (packet.state === 'drop') {
                        ctx.fillStyle = 'white';
                        ctx.font = '14px Segoe UI';
                        ctx.fillText('❌', cardWidth - 20, 18);
                    } else if (packet.state === 'ecmp') {
                        ctx.fillStyle = 'white';
                        ctx.font = '14px Segoe UI';
                        ctx.fillText('🔀', cardWidth - 20, 18);
                    }

                    // Restore context
                    ctx.restore();
                });
                
                document.getElementById('switchCount').textContent = this.switches.size;
            }
        }

        // Initialize visualizer when DOM is ready
        document.addEventListener('DOMContentLoaded', () => {
            new NetworkVisualizer();
        });
    </script>
</body>
</html>
