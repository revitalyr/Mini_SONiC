services:
  switch1:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: mini-sonic-switch1
    hostname: switch1
    networks:
      spine-leaf:
        ipv4_address: 172.20.0.11
    ports:
      - "8081:8080"
      - "9001:9000"
    environment:
      - SWITCH_ID=1
      - LOG_LEVEL=INFO
    command: ["./mini_sonic", "--port", "9000", "--peer", "switch2:9000"]

  switch2:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: mini-sonic-switch2
    hostname: switch2
    networks:
      spine-leaf:
        ipv4_address: 172.20.0.12
    ports:
      - "8082:8080"
      - "9002:9000"
    environment:
      - SWITCH_ID=2
      - LOG_LEVEL=INFO
    command: ["./mini_sonic", "--port", "9000", "--peer", "switch1:9000", "--peer", "switch3:9000"]

  switch3:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: mini-sonic-switch3
    hostname: switch3
    networks:
      spine-leaf:
        ipv4_address: 172.20.0.13
    ports:
      - "8083:8080"
      - "9003:9000"
    environment:
      - SWITCH_ID=3
      - LOG_LEVEL=INFO
    command: ["./mini_sonic", "--port", "9000", "--peer", "switch2:9000"]

  # CLI client for testing
  cli:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: mini-sonic-cli
    hostname: cli
    networks:
      - spine-leaf
    environment:
      - LOG_LEVEL=INFO
    command: ["tail", "-f", "/dev/null"]
    depends_on:
      - switch1
      - switch2
      - switch3

  # Unit tests runner
  tests:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: mini-sonic-tests
    command: ["./mini_sonic_tests"]
    profiles: ["test"]

networks:
  spine-leaf:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1